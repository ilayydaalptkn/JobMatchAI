name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore JobMatchAPI/JobMatchAPI.csproj

      - name: Build
        run: dotnet build JobMatchAPI/JobMatchAPI.csproj --no-restore -c Release

      - name: Test
        run: dotnet test JobMatchAPI.Tests/JobMatchAPI.Tests.csproj -c Release --verbosity normal
